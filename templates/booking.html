<!DOCTYPE html>
<html>
<body style="font-family: Arial; background:#f4f6f8; padding:20px;">
  <div style="max-width:600px; margin:auto; background:#ffffff; border-radius:12px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,0.1);">

    <!-- Header -->
    <div style="background:#ff4d4f; padding:20px; color:white; text-align:center;">
      <h2>🎟️ Booking Confirmed</h2>
    </div>

    <!-- Body -->
    <div style="padding:20px; color:#333;">
      <p>Hello <b>{{name}}</b>,</p>
      <p>Your ticket has been successfully booked 🎉</p>

      <div style="background:#f9f9f9; padding:15px; border-radius:8px; margin-top:15px;">
        <p><b>🎤 Event:</b> {{eventTitle}}</p>
        <p><b>📅 Date:</b> {{date}}</p>
        <p><b>⏰ Time:</b> {{time}}</p>
        <p><b>📍 Venue:</b> {{venue}}</p>
        <p><b>🎫 Tickets:</b> {{tickets}}</p>
        <p><b>💰 Total:</b> ₹{{price}}</p>
      </div>

      <div style="text-align:center; margin:20px;">
        <a href="#" style="background:#ff4d4f; color:white; padding:12px 20px; text-decoration:none; border-radius:6px;">
          View Booking
        </a>
      </div>

      <p style="font-size:12px; color:#888;">Enjoy your event! 🎉</p>
    </div>

  </div>
</body>
</html>
